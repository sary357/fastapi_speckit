# Alembic configuration for database schema migrations
# This file is auto-generated by `alembic init`; you may customize it

[alembic]
sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.engine.url.drivername = postgresql+asyncpg

# Path to migration scripts
script_location = migrations

# File template for new migration scripts
file_template = %%(rev)s_%%(slug)s

# Format of timestamps for migration files
date_format = %Y%m%d_%H%M%S

# Revision identifier style ('uuid' or 'numeric')
revision_format = numeric
sqlalchemy.scheme = postgresql

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
