openapi: 3.1.0
info:
  title: Like/Dislike 與留言收集 API
  version: "1.0.0"
  description: >-
    無需身份驗證的後端 API，用於收集使用者的讚／不讚反應與留言，
    並記錄收到時間（UTC）與來源 IP。

paths:
  /api/reactions:
    post:
      summary: 送出讚或不讚反應
      operationId: createReaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionRequest"
      responses:
        "200":
          description: 反應已成功收到並記錄
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "422":
          description: 請求格式無效（例如 reaction_type 缺漏或不在允許值範圍內）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: 超過速率限制（每來源 IP 每分鐘最多 5 次，讚/不讚與留言兩端點合計）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/comments:
    post:
      summary: 送出留言
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "200":
          description: 留言已成功收到並記錄
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "422":
          description: 請求格式無效（例如留言內容缺漏、為空白，或超過 1000 字元長度限制）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: 超過速率限制（每來源 IP 每分鐘最多 5 次，讚/不讚與留言兩端點合計）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ReactionRequest:
      type: object
      required:
        - reaction_type
      properties:
        reaction_type:
          type: string
          enum: [like, dislike]
          description: 反應類型，僅允許 like 或 dislike

    CommentRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 1000
          description: 留言內容，去除前後空白後不得為空字串，長度不得超過 1000 字元

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: ["OK"]
      example:
        status: "OK"

    ErrorResponse:
      type: object
      description: >-
        錯誤回應格式（由 FastAPI 驗證失敗時的預設格式，或自訂錯誤處理器產生），
        用以說明請求為何被拒絕。
      properties:
        detail:
          type: array
          items:
            type: object
